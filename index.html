<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diabetes Risk Classification System</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>Diabetes Risk Classification System</h1>

        <p class="subtitle">
            Machine Learning Based Diabetes Prediction
        </p>

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="name" placeholder="Enter Patient Name">
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age">
        </div>

        <div class="form-group">
            <label>Pregnancies</label>
            <input type="number" id="preg">
        </div>

        <div class="form-group">
            <label>Glucose</label>
            <input type="number" id="glucose">
        </div>

        <div class="form-group">
            <label>Blood Pressure</label>
            <input type="number" id="bp">
        </div>

        <div class="form-group">
            <label>Skin Thickness</label>
            <input type="number" id="skin">
        </div>

        <div class="form-group">
            <label>Insulin</label>
            <input type="number" id="insulin">
        </div>

        <div class="form-group">
            <label>BMI</label>
            <input type="number" step="0.1" id="bmi">
        </div>

        <div class="form-group">
            <label>Diabetes Pedigree Function</label>
            <input type="number" step="0.01" id="dpf">
        </div>

        <button onclick="predictDiabetes()">
            Predict Diabetes Risk
        </button>

    </div>

    <div class="right-panel">

        <h2>Prediction Result</h2>

        <div class="result-card">

            <div class="emoji" id="emoji">
                🩺
            </div>

            <h3 id="result">
                Waiting for Prediction...
            </h3>

            <p id="confidence">
                Confidence : --
            </p>

            <p id="risk">
                Risk Level : --
            </p>

            <p id="recommendation">
                Enter patient information and click Predict Diabetes Risk.
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
